name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  js-css-i18n:
    name: JS / CSS / i18n lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # TODO: pin to commit SHA — run `gh api repos/actions/checkout/git/refs/tags/v4`
        # and replace @v4 with @<sha> once Dependabot begins managing this.
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  php:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - run: composer install --prefer-dist --no-progress
      - run: composer test
