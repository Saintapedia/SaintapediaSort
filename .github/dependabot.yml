version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns: [ "eslint*", "grunt-eslint" ]
      stylelint:
        patterns: [ "stylelint*" ]
    ignore:
      # grunt-eslint 25+ requires ESLint 9, but eslint-config-wikimedia
      # (latest 0.32.4) only supports ESLint 8 (peer: eslint ^8.57.0).
      # Blocked upstream until eslint-config-wikimedia ships ESLint 9 support.
      - dependency-name: grunt-eslint
        update-types: [ version-update:semver-major ]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
